# SITE CONFIGURATION
# domain: ""
baseurl: "" # the subpath of your site, e.g. /blog/
url: "http://fhightower.github.io/" # the base hostname & protocol for your site
avatar: https://avatars3.githubusercontent.com/u/3599813
favicon: favicon.png
basecss: 
# Theme specific configuration
title: Floyd Hightower
description: >
  I'm a programmer who loves writing code and is passionate about using programming for good.

# BUILD SETTINGS
permalink: /:year/:month/:title/
markdown: kramdown
highlighter: rouge
exclude: ['node_modules', 'gulpfile.js', 'package.json']
kramdown:
  input: GFM

# CONTACT AND SOCIAL MEDIA LINKS
twitter_username: hightowerfloyd
github_username: fhightower
500px_username: fhightower

# If U enable the comment, edit disqus or duoshuo account
# before deploy your webpage
# enable_comment: true
# disqus_account: songroger

# PAGINATION
plugins:
  - jekyll-paginate
  - jekyll-paginate-multiple

paginate_multiple:
  - paginate: 5
    paginate_path: '/programming/page:num'
    sub_dir: '/programming'
  - paginate: 5
    paginate_path: '/threat-intelligence/page:num'
    sub_dir: '/threat-intelligence'
  - paginate: 5
    paginate_path: '/miscellaneous/page:num'
    sub_dir: '/miscellaneous'
